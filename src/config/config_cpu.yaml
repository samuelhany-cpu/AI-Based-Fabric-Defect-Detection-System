project:
  name: fabric-defect-detection
  seed: 42

dataset:
  root_dir: data/archive_3
  format: aitex_archive3
  manifest_path: data/splits/manifest.csv
  split_summary_path: data/splits/split_summary.json
  image_size: 160
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  class_names:
    non_defective: 0
    defective: 1
  extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .tif
    - .tiff
  group_depth: 1
  num_workers: 0

augmentations:
  horizontal_flip_prob: 0.5
  rotation_degrees: 3
  color_jitter:
    brightness: 0.03
    contrast: 0.03
    saturation: 0.03
    hue: 0.01

training:
  model_name: resnet18
  pretrained: true
  batch_size: 2
  epochs: 8
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  scheduler_factor: 0.5
  scheduler_patience: 2
  early_stopping_patience: 3
  amp: false
  freeze_backbone: true
  decision_threshold: 0.5

evaluation:
  split: test

paths:
  model_dir: outputs/models
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures
  logs_dir: outputs/logs
