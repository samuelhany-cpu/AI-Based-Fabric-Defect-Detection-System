project:
  name: fabric-defect-detection
  seed: 42

runtime:
  cache_root: F:/Machine_Learning/.runtime-cache
  temp_dir: F:/Machine_Learning/.runtime-cache/tmp
  torch_home: F:/Machine_Learning/.runtime-cache/torch
  mpl_config_dir: F:/Machine_Learning/.runtime-cache/matplotlib

dataset:
  root_dir: data/archive_3
  format: aitex_archive3
  manifest_path: data/splits/manifest.csv
  split_summary_path: data/splits/split_summary.json
  image_size: 224
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  class_names:
    non_defective: 0
    defective: 1
  extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .tif
    - .tiff
  group_depth: 1
  num_workers: 2

augmentations:
  horizontal_flip_prob: 0.5
  rotation_degrees: 5
  color_jitter:
    brightness: 0.05
    contrast: 0.05
    saturation: 0.05
    hue: 0.02

training:
  model_type: patch_anomaly
  model_name: resnet18
  pretrained: true
  batch_size: 8
  amp: true
  patch_knn_neighbors: 1
  patch_top_k: 5
  max_patches: 20000
  threshold_strategy: normal_quantile
  threshold_quantile: 0.95
  decision_threshold: 0.5

evaluation:
  split: test

paths:
  model_dir: outputs/models
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures
  logs_dir: outputs/logs
